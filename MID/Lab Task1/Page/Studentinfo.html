<!DOCTYPE html>

<html lang="en-US">

<head>
    <title>Student Information</title>
    <link rel="stylesheet" href="D:\AIUB\SEM8\WEB TECHNOLOGIES\Reve\MID\Lab Task1\Design\design.css">
</head>

<body>

    <form>
        <fieldset>
            <div class="fieldset-title">
            <legend>Student Information</legend>
            </div>

            <table>

                <div class="1st-group">
                <tr>
                    <td><label>Full Name (Text)</label></td>
                    <td><label>Email Address</label></td>
                </tr>
                <tr>
                    <td><input type="text" name="fullname" placeholder="Enter your full name"></td>
                    <td><input type="email" name="email" placeholder="your.email@example.com"></td>
                </tr>
                </div>

                <div class="2nd-group">
                <tr>
                    <td><label>Password</label></td>
                    <td><label>Age (Number)</label></td>
                </tr>
                <tr>
                    <td><input type="password" name="password" placeholder="Enter secure password"></td>
                    <td><input type="number" name="age" placeholder="Enter your age"></td>
                </tr>
                </div>

                <div class="3rd-group">
                <tr>
                    <td><label>Experiment Date</label></td>
                    <td><label>Phone Number (Tel)</label></td>
                </tr>
                <tr>
                    <td><input type="date" name="birthdate" placeholder="Enter your birth date"></td>
                    <td><input type="number" name="phone" placeholder="+880 XXXX XXXXXX"></td>
                </tr>
                </div>

            </table>

        </fieldset>

        <div class="buttons">
        <input type="submit" id="submit" value="Submit">
        <input type="reset" id="clr" value="Clear">
        </div>

    </form>

</body>

</html>
